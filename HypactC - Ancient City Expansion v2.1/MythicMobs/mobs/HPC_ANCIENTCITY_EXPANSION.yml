HPC_WUG:
  Type: HUSK
  Display: 'Wug'
  Health: 15
  Damage: 8
  Faction: Ancient
  Drops:
  - ROTTEN_FLESH 1-3 1
  - exp 20-60 1
  Options:
    MovementSpeed: 0.25
    PreventRandomEquipment: true
    AlwaysShowName: false
    Despawn: NORMAL
    PreventOtherDrops: true
    KnockbackResistance: 0.7
    FollowRange: 20
    Silent: true
    PreventSunburn: true
    PreventJockeyMounts: true
  Modules:
    ThreatTable: true
  AIGoalSelectors:
  - clear
  - meleeAttack{fu=false}
  - randomStroll 
  - lookAtTarget
  AITargetSelectors:
  - clear
  - players
  - otherFaction
  Skills:
  - model{mid=HPC_WUG;tint=false;usm=true;save=true;drive=false;ride=false} @self ~onSpawnorload 
  - potion{t=POISON;d=120} @target ~onAttack 
  - potion{t=DARKNESS;d=120} @target ~onAttack  
  - sound{s=entity.spider.ambient;p=2.00;v=2;r=16} @self ~onTimer:170
  - sound{s=entity.phantom.bite;p=2.00;v=2;r=16} @self ~onAttack 
  - sound{s=entity.spider.hurt;p=2.00;v=2;r=16} @self ~onDamaged 
  - sound{s=entity.spider.death;p=2.00;v=2;r=16} @self ~onDamaged 
  - sound{s=entity.player.attack.crit;v=2;r=16} @self ~onDamaged 
  - brightness{m=HPC_WUG;p=head2;s=15;b=15} @self ~onSpawnorload 

